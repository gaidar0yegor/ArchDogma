  # -------------------------------------------------------------------------
  # 6. TDD — v0.1 priority, filled
  # -------------------------------------------------------------------------
  - id: tdd
    number: 6
    title: "TDD (Test-Driven Development)"
    v01_priority: true
    status: filled
    definition: "Red-Green-Refactor. Сначала пишем тест, потом код."
    origin: "Kent Beck."

    failure_conditions:
      - "Неизвестная область — ещё не знаешь, каким должен быть API."
      - "UI-код, визуализации."
      - "Research / exploratory coding."

    failure_cases: need_postmortems
    success_cases: need_data

    counter_dogmas:
      - name: "Spike First"
        attribution: "Kent Beck, «Extreme Programming Explained» (1999)"
        thesis: "В неизвестной области сначала spike (одноразовый прототип без тестов), потом выбрасывается, потом переписывается через TDD."
      - name: "Test After / Test Last"
        attribution: "folk, контр-практика"
        thesis: "Тесты пишутся после реализации, когда API уже устоялся. Область: UI, exploratory, research."
      - name: "Characterization Testing"
        attribution: "Michael Feathers, «Working Effectively with Legacy Code» (2004)"
        thesis: "Для legacy без тестов: тест фиксирует текущее поведение, чтобы рефакторить безопасно."
      - name: "TDD is dead. Long live testing."
        attribution: "DHH (David Heinemeier Hansson), 2014"
        source_url: "https://dhh.dk/2014/tdd-is-dead-long-live-testing.html"
        thesis: "TDD как идеология привела к over-mocking и дизайну под тесты вместо дизайна под задачу."

    honest_verdict:
      status: draft_awaiting_cases
      follow_when:
        - "Ты уже понимаешь домен и примерно знаешь, каким должен быть API."
        - "Работаешь над стабильной бизнес-логикой, которую планируешь рефакторить."
        - "Цена ошибки в проде очень высокая (финансы, безопасность, медицина, биллинг)."
      break_when:
        - "Ты в неизвестной области — используй Spike First."
        - "Работаешь с UI, сложными визуальными состояниями или внешними интеграциями — Test After."
        - "Работаешь с legacy без тестов — Characterization Testing."
        - "Прототип / proof of concept, который будет выброшен через неделю."
      main_signal: "Ты пишешь тест раньше, чем понял, что код должен делать. Результат — хорошо протестированный неправильный дизайн + лес моков."

    related_tags: []  # требует Tier 4 (coverage + test structure), не статический анализ функции

