# ArchDogma catalog — machine-readable source of truth per ADR-002.
#
# Statuses:
#   stub    = заголовок и определение есть, кейсов нет
#   draft   = есть черновой honest_verdict, но без реальных post-mortems
#   filled  = заполнено полностью (для v0.1 — три приоритетные догмы)
#
# Правила:
#   - каждая counter_dogma обязана иметь attribution (валидатор — в alpha3)
#   - related_tags — имена Tier 1/2/... детекторов, которые мэппятся на догму
#   - пустой related_tags означает: «догма существует не на уровне функции»
#     (DRY/Microservices — не детектируются по одной функции, это честно)

schema_version: 1
updated: 2026-04-18

dogmas:

  # -------------------------------------------------------------------------
  # 1. 100% Test Coverage — stub
  # -------------------------------------------------------------------------
  - id: hundred-percent-coverage
    number: 1
    title: "100% Test Coverage"
    status: stub
    definition: "Всё должно быть покрыто unit-тестами. Непокрытый код — это риск."
    origin: "TDD-движение, Kent Beck, Uncle Bob, XP."
    related_tags: []  # требует Tier 4 coverage data, не уровень функции

  # -------------------------------------------------------------------------
  # 2. Clean Architecture / N слоёв — stub
  # -------------------------------------------------------------------------
  - id: clean-architecture
    number: 2
    title: "Clean Architecture / N слоёв абстракции"
    status: stub
    definition: "Разделяй код на слои (domain, application, infrastructure, presentation). Зависимости идут внутрь."
    origin: "Uncle Bob, «Clean Architecture». Ранее Hexagonal/Onion Architecture."
    related_tags: []  # file/module-level, не функция

  # -------------------------------------------------------------------------
  # 3. DRY — v0.1 priority, filled
  # -------------------------------------------------------------------------
  - id: dry
    number: 3
    title: "DRY (Don't Repeat Yourself)"
    v01_priority: true
    status: filled
    definition: "Никогда не копипасть. Любое повторение — кандидат на абстракцию."
    origin: "«The Pragmatic Programmer», Hunt & Thomas, 1999."

    failure_conditions:
      - "Когда две похожие вещи объединяются в одну абстракцию, а потом расходятся."
      - "Shared libraries между командами с разными release-циклами."
      - "Слишком ранняя абстракция (до 3-го реального use case)."

    failure_cases: need_postmortems
    success_cases: need_data

    counter_dogmas:
      - name: "WET (Write Everything Twice)"
        attribution: "folk, анонимный"
        thesis: "Пока не увидел повторение дважды — не абстрагируй."
      - name: "Rule of Three"
        attribution: "Don Roberts via Martin Fowler, «Refactoring» (1999)"
        thesis: "Три повторения — только тогда кандидат на абстракцию."
      - name: "The Wrong Abstraction"
        attribution: "Sandi Metz, 2016"
        source_url: "https://sandimetz.com/blog/2016/1/20/the-wrong-abstraction"
        thesis: "Duplication is far cheaper than the wrong abstraction."
      - name: "AHA (Avoid Hasty Abstractions)"
        attribution: "Kent C. Dodds, 2019"
        source_url: "https://kentcdodds.com/blog/aha-programming"
        thesis: "Раньше в каталоге AHA ошибочно атрибутировался Sandi Metz — это разные авторы."

    honest_verdict:
      status: draft_awaiting_cases
      follow_when:
        - "Повторяется знание (бизнес-правило, формула, инвариант), а не форма кода."
        - "Ты видишь третье повторение (Rule of Three), и все три вызываются из одного контекста / одной командой / одного релизного цикла."
        - "Цена ошибочной абстракции ниже цены дубля."
      break_when:
        - "Два куска кода выглядят одинаково, но меняются по разным причинам (разные стейкхолдеры, разные релиз-циклы, разные домены)."
        - "Абстракция пересекает границу команд или сервисов."
        - "Есть только 1–2 повторения, и ты ещё не видел, как оно реально меняется."
        - "Код — исследовательский / одноразовый."
      main_signal: "Каждое новое требование добавляет в «общую» функцию if-флаг. Это не расширение — это признание, что ты склеил две разные вещи."

    related_tags:
      - wrong-abstraction  # future Tier 5 — detect via divergent call-sites + if-on-parameter inside shared fn

  # -------------------------------------------------------------------------
  # 4. Microservices — v0.1 priority, filled
  # -------------------------------------------------------------------------
  - id: microservices
    number: 4
    title: "Microservices для всего"
    v01_priority: true
    status: filled
    definition: "Монолит — зло. Режь систему на маленькие сервисы."
    origin: "Netflix, Amazon, ThoughtWorks, ~2014."

    failure_conditions:
      - "Команда < 10 человек."
      - "Один продукт, не независимые бизнес-юниты."
      - "Distributed transactions становятся нормой."
      - "Debug занимает 3 часа, потому что trace разлетается по 12 сервисам."

    failure_cases: need_postmortems
    success_cases:
      - title: "Netflix, Amazon (на определённом масштабе)"
        source_url: null
        summary: "Нужны конкретные ссылки на post-mortems с числами."

    counter_dogmas:
      - name: "MonolithFirst"
        attribution: "Martin Fowler, 2015"
        source_url: "https://martinfowler.com/bliki/MonolithFirst.html"
        thesis: "Почти все успешные микросервисные системы начинались как монолиты и были распилены позже."
      - name: "Modular Monolith"
        attribution: "Shopify и другие"
        thesis: "Модули с чёткими границами внутри одного процесса. Без сетевых границ, но с возможностью разделить позже."
      - name: "Prime Video monolith migration"
        attribution: "Amazon Prime Video Tech Blog, 2023"
        source_url: "https://www.primevideotech.com/video-streaming/scaling-up-the-prime-video-audio-video-monitoring-service-and-reducing-costs-by-90"
        thesis: "Переход от serverless/микросервисов обратно к монолиту со снижением инфраструктурных затрат на 90%."

    honest_verdict:
      status: draft_awaiting_cases
      follow_when:
        - "У тебя действительно несколько независимых бизнес-доменов с разными командами, релизными циклами и масштабом."
        - "Команда больше 10–15 человек и уже есть конкретная боль от монолита."
        - "Ты готов платить операционную цену распределённой системы."
      break_when:
        - "Команда < 10 человек и/или один продукт."
        - "Проект в фазе стартапа / MVP — домен ещё не устоялся."
        - "Появляются distributed transactions или debug-сессии, где trace разлетается по 5+ сервисам."
        - "Основная боль — в сложности бизнес-логики, а не в масштабе."
      main_signal: "Distributed monolith — куча мелких сервисов, которые всё равно меняются вместе и деплоятся вместе, но теперь ещё через сеть."

    related_tags: []  # системный уровень, не детектируется на одной функции

